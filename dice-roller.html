<html lang="ko">
<head>
  <meta charset="utf-8">

  <meta name="description" content="1개부터 6개까지 주사위를 굴려 합계와 결과를 확인하는 무료 온라인 주사위 도구입니다. 보드게임, 벌칙, 랜덤 선택에 사용할 수 있습니다.">

  <link rel="stylesheet" href="/assets/styles.css">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3EZW95TCSF"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-3EZW95TCSF');</script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4587553505034907" crossorigin="anonymous"></script>
</head>
<body>
  <header class="site-header"><nav class="nav"><a class="logo" href="/"><span class="logo-mark">R</span><span>랜덤툴즈</span></a><div class="nav-links"><a href="/server-time.html">서버시간</a><a href="/coin-flip.html">동전</a><a href="/random-picker.html">랜덤뽑기</a><a href="/roulette.html">룰렛</a></div></nav></header>
  <main class="container">
    <div class="tool-layout">
      <section class="card">
        <div class="eyebrow">Dice Roller</div>
        <h1>주사위 굴리기</h1>
        <p class="lead">주사위 개수를 정하고 굴리면 각 눈과 합계를 보여줍니다.</p>
        <div class="field">
          <label for="diceCount">주사위 개수</label>
          <input id="diceCount" type="number" min="1" max="6" value="2">
        </div>
        <button id="diceRun" class="button">주사위 굴리기</button>
        <div id="diceResult" class="result">결과가 여기에 표시됩니다.</div>
      </section>
      <aside class="ad-box"><div class="ad-label">Advertisement</div><p>Google AdSense 승인 후 자동 광고가 표시될 수 있습니다.</p></aside>
    </div>
    <article class="article section">
      <h2>온라인 주사위 활용</h2>
      <p>보드게임, 발표 순서, 벌칙 정하기, 간단한 확률 게임처럼 물리 주사위가 없을 때 사용할 수 있습니다. 입력과 결과는 브라우저 안에서만 처리됩니다.</p>
      <p class="tools"><a href="/coin-flip.html">동전 던지기</a> <a href="/number-randomizer.html">랜덤 숫자 뽑기</a> <a href="/penalty-roulette.html">벌칙 룰렛</a> <a href="/draw-lots.html">제비뽑기</a></p>
    </article>
  </main>
  <footer class="footer"><div class="footer-inner"><span>© 2026 랜덤툴즈</span><span><a href="/privacy.html">개인정보처리방침</a></span></div></footer>
  <script>
    const diceResult = document.getElementById('diceResult');
    document.getElementById('diceRun').addEventListener('click', () => {
      const count = Math.max(1, Math.min(6, Number(document.getElementById('diceCount').value) || 1));
      const rolls = Array.from({ length: count }, () => Math.floor(Math.random() * 6) + 1);
      const total = rolls.reduce((sum, value) => sum + value, 0);
      diceResult.textContent = `결과: ${rolls.join(', ')} · 합계 ${total}`;
    });
  </script>
</body>
</html>
